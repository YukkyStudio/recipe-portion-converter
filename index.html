<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>料理計量アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #ffffff;
    --bg: #f7f5f2;
    --surface: #ffffff;
    --border: #e8e4de;
    --border-light: #f0ece6;
    --text: #1a1714;
    --text-mid: #6b6560;
    --text-light: #a09a93;
    --accent: #c8733a;
    --accent-light: #f5ece4;
    --accent-mid: #e8966a;
    --green: #4a8c5c;
    --green-light: #eaf3ec;
    --btn-bg: #f0ece6;
    --btn-active: #e0d8ce;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0;
  }

  .app {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: var(--white);
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border-light);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--text);
  }
  .header p {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  .content {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 20px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 16.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 14px;
  }

  /* Serving rows */
  .serving-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 0;
  }
  .serving-row + .serving-row {
    border-top: 1px solid var(--border-light);
  }
  .serving-label {
    font-size: 16.9px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }
  .counter {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--btn-bg);
    border-radius: 50px;
    padding: 3px;
  }
  .counter-btn {
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    border-radius: 50%;
    font-size: 18px;
    font-weight: 300;
    cursor: pointer;
    color: var(--text-mid);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }
  .counter-btn:active {
    background: var(--btn-active);
    transform: scale(0.92);
  }
  .counter-btn.minus { color: var(--text-light); }
  .counter-btn.plus { color: var(--accent); }
  .counter-value {
    font-family: 'DM Mono', monospace;
    font-size: 17px;
    font-weight: 500;
    min-width: 28px;
    text-align: center;
    color: var(--text);
  }
  .counter-unit {
    font-size: 12px;
    color: var(--text-mid);
    font-weight: 400;
    padding-left: 6px;
    white-space: nowrap;
  }
  .serving-unit {
    font-size: 15.6px;
    font-weight: 500;
  }

  /* Seasoning */
  .seasoning-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .select-wrapper {
    flex: 1;
    position: relative;
    margin-right: 10px;
  }
  .select-wrapper::after {
    content: '▾';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-light);
    font-size: 12px;
    pointer-events: none;
  }
  select {
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    background: var(--btn-bg);
    border: none;
    border-radius: 50px;
    padding: 10px 36px 10px 16px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    outline: none;
  }
  .reset-btn {
    background: var(--accent-light);
    color: var(--accent);
    border: none;
    border-radius: 50px;
    padding: 10px 16px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .reset-btn:active {
    background: #f0d6c4;
    transform: scale(0.95);
  }

  /* Measurement rows */
  .measure-section-title {
    font-size: 16.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 10px;
  }
  .measure-rows {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .measure-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 0;
    border-bottom: 1px solid var(--border-light);
    gap: 10px;
  }
  .measure-row:last-child { border-bottom: none; }
  .measure-name {
    font-size: 21px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }
  .measure-name sub {
    font-size: 19.5px;
    color: var(--text-light);
    vertical-align: baseline;
    margin-left: 2px;
  }
  .measure-counter {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--btn-bg);
    border-radius: 50px;
    padding: 2px;
  }
  .measure-counter .counter-btn {
    width: 30px;
    height: 30px;
    font-size: 16px;
  }
  .measure-counter .counter-value {
    font-size: 15px;
    min-width: 24px;
  }
  .measure-unit {
    font-size: 11px;
    color: var(--text-light);
    margin-left: 6px;
    white-space: nowrap;
  }
  .row-reset-btn {
    background: var(--accent-light);
    color: var(--accent);
    border: none;
    border-radius: 50px;
    padding: 5px 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    margin-left: 4px;
  }
  .row-reset-btn:active {
    background: #f0d6c4;
    transform: scale(0.95);
  }

  /* Result */
  .result-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .result-header {
    background: var(--text);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-header-title {
    font-size: 16.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }
  .result-label {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    margin-left: auto;
    letter-spacing: 0.05em;
  }
  .result-body {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .result-item {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border-light);
  }
  .result-item:last-child { border-bottom: none; padding-bottom: 0; }
  .result-item-label {
    font-size: 16.5px;
    color: var(--text-light);
    font-weight: 500;
    letter-spacing: 0.05em;
    padding-top: 2px;
    white-space: nowrap;
  }
  .result-item-value {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    text-align: right;
    line-height: 1.4;
  }
  .result-item-value.highlight {
    color: var(--accent);
  }
  .result-item-value small {
    font-size: 11px;
    color: var(--text-light);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 400;
  }

  /* Adjusted result */
  .adjust-note {
    font-size: 10px;
    color: var(--text-light);
    text-align: center;
    padding: 6px 0 0;
    letter-spacing: 0.03em;
  }
  .ratio-badge {
    display: inline-flex;
    align-items: center;
    background: var(--green-light);
    color: var(--green);
    border-radius: 50px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 2px;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🥄 料理計量アプリ</h1>
    <p>COOKING MEASUREMENT CONVERTER</p>
  </div>

  <div class="content">

    <!-- Servings -->
    <div class="card">
      <div class="card-title">人数設定</div>
      <div class="serving-row">
        <div class="serving-label">
          レシピは？
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="counter">
            <button class="counter-btn minus" onclick="changeServing('recipe', -1)">−</button>
            <span class="counter-value" id="recipe-val">1</span>
            <button class="counter-btn plus" onclick="changeServing('recipe', 1)">＋</button>
          </div>
          <span class="counter-unit serving-unit">人分</span>
          <button class="row-reset-btn" onclick="resetServing('recipe')">リセット</button>
        </div>
      </div>
      <div class="serving-row">
        <div class="serving-label">
          作りたいのは？
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="counter">
            <button class="counter-btn minus" onclick="changeServing('target', -1)">−</button>
            <span class="counter-value" id="target-val">1</span>
            <button class="counter-btn plus" onclick="changeServing('target', 1)">＋</button>
          </div>
          <span class="counter-unit serving-unit">人分</span>
          <button class="row-reset-btn" onclick="resetServing('target')">リセット</button>
        </div>
      </div>

    </div>

    <!-- Seasoning -->
    <div class="card">
      <div class="card-title">調味料</div>
      <div class="seasoning-header">
        <div class="select-wrapper">
          <select id="seasoning" onchange="calculate()">
            <option value="water">水</option>
            <option value="soy">しょうゆ</option>
            <option value="sake">調理酒</option>
            <option value="mirin">みりん</option>
            <option value="vinegar">酢</option>
            <option value="sauce">ソース</option>
            <option value="ketchup">ケチャップ</option>
            <option value="mayo">マヨネーズ</option>
            <option value="sugar">砂糖</option>
            <option value="salt">塩</option>
            <option value="oil">サラダ油</option>
          </select>
        </div>
        <button class="reset-btn" onclick="resetAll()">リセット</button>
      </div>
    </div>

    <!-- Measurement -->
    <div class="card">
      <div class="measure-section-title">計量スプーン入力</div>
      <div class="measure-rows">
        <div class="measure-row">
          <span class="measure-name">大さじ</span>
          <div class="measure-counter">
            <button class="counter-btn minus" onclick="changeMeasure('tbsp', -1)">−</button>
            <span class="counter-value" id="tbsp-val">0</span>
            <button class="counter-btn plus" onclick="changeMeasure('tbsp', 1)">＋</button>
          </div>
          <span class="measure-unit">杯</span>
          <button class="row-reset-btn" onclick="resetMeasure('tbsp')">リセット</button>
        </div>
        <div class="measure-row">
          <span class="measure-name">大さじ<sub>1/2</sub></span>
          <div class="measure-counter">
            <button class="counter-btn minus" onclick="changeMeasure('tbsp_half', -1)">−</button>
            <span class="counter-value" id="tbsp_half-val">0</span>
            <button class="counter-btn plus" onclick="changeMeasure('tbsp_half', 1)">＋</button>
          </div>
          <span class="measure-unit">杯</span>
          <button class="row-reset-btn" onclick="resetMeasure('tbsp_half')">リセット</button>
        </div>
        <div class="measure-row">
          <span class="measure-name">小さじ</span>
          <div class="measure-counter">
            <button class="counter-btn minus" onclick="changeMeasure('tsp', -1)">−</button>
            <span class="counter-value" id="tsp-val">0</span>
            <button class="counter-btn plus" onclick="changeMeasure('tsp', 1)">＋</button>
          </div>
          <span class="measure-unit">杯</span>
          <button class="row-reset-btn" onclick="resetMeasure('tsp')">リセット</button>
        </div>
        <div class="measure-row">
          <span class="measure-name">小さじ<sub>1/2</sub></span>
          <div class="measure-counter">
            <button class="counter-btn minus" onclick="changeMeasure('tsp_half', -1)">−</button>
            <span class="counter-value" id="tsp_half-val">0</span>
            <button class="counter-btn plus" onclick="changeMeasure('tsp_half', 1)">＋</button>
          </div>
          <span class="measure-unit">杯</span>
          <button class="row-reset-btn" onclick="resetMeasure('tsp_half')">リセット</button>
        </div>
        <div class="measure-row">
          <span class="measure-name">小さじ<sub>1/4</sub></span>
          <div class="measure-counter">
            <button class="counter-btn minus" onclick="changeMeasure('tsp_quarter', -1)">−</button>
            <span class="counter-value" id="tsp_quarter-val">0</span>
            <button class="counter-btn plus" onclick="changeMeasure('tsp_quarter', 1)">＋</button>
          </div>
          <span class="measure-unit">杯</span>
          <button class="row-reset-btn" onclick="resetMeasure('tsp_quarter')">リセット</button>
        </div>
      </div>
    </div>

    <!-- Result -->
    <div class="result-card">
      <div class="result-header">
        <span class="result-header-title">換算結果</span>
        <span class="result-label">RESULT</span>
      </div>
      <div class="result-body">
        <div class="result-item">
          <span class="result-item-label">計量</span>
          <span class="result-item-value" id="result-measure">−</span>
        </div>
        <div class="result-item">
          <span class="result-item-label">容量</span>
          <span class="result-item-value" id="result-cc">0 <small>cc</small></span>
        </div>
        <div class="result-item">
          <span class="result-item-label">重さ</span>
          <span class="result-item-value highlight" id="result-g">約 0 <small>g</small></span>
        </div>
      </div>
      <p class="adjust-note" id="serving-note">レシピ通りの分量を表示しています</p>
    </div>

  </div>
</div>

<script>
const state = {
  recipe: 1,
  target: 1,
  measures: { tbsp: 0, tbsp_half: 0, tsp: 0, tsp_half: 0, tsp_quarter: 0 }
};

// cc per 1 cup of each measure type
const CC = { tbsp: 15, tbsp_half: 7.5, tsp: 5, tsp_half: 2.5, tsp_quarter: 1.25 };

// Density (g/cc) per seasoning
const DENSITY = {
  water: 1.0, soy: 1.15, sake: 0.95, mirin: 1.2, vinegar: 1.01,
  sauce: 1.15, ketchup: 1.1, mayo: 0.91, sugar: 0.8, salt: 1.2, oil: 0.91
};

function resetServing(type) {
  state[type] = 1;
  document.getElementById(type + '-val').textContent = 1;
  calculate();
}

function changeServing(type, delta) {
  state[type] = Math.max(1, state[type] + delta);
  document.getElementById(type + '-val').textContent = state[type];
  calculate();
}

function resetMeasure(key) {
  state.measures[key] = 0;
  document.getElementById(key + '-val').textContent = 0;
  calculate();
}

function changeMeasure(key, delta) {
  state.measures[key] = Math.max(0, state.measures[key] + delta);
  document.getElementById(key + '-val').textContent = state.measures[key];
  calculate();
}

function resetAll() {
  Object.keys(state.measures).forEach(k => {
    state.measures[k] = 0;
    document.getElementById(k + '-val').textContent = 0;
  });
  document.getElementById('seasoning').value = 'water';
  calculate();
}

function toSpoonText(totalCC) {
  if (totalCC <= 0) return '−';
  // Use 1.25cc (小さじ1/4) as base unit
  let units = Math.round(totalCC / 1.25);

  const steps = [
    { label: '大さじ', u: 12 },
    { label: '大さじ1/2', u: 6 },
    { label: '小さじ', u: 4 },
    { label: '小さじ1/2', u: 2 },
    { label: '小さじ1/4', u: 1 },
  ];

  // Try greedy from large to small, then also try skipping 大さじ1/2
  // and compare which gives fewer or cleaner parts
  function greedy(u, skipIdx) {
    let rem = u;
    const p = [];
    steps.forEach((s, i) => {
      if (i === skipIdx) return;
      const count = Math.floor(rem / s.u);
      if (count > 0) { p.push({ label: s.label, count }); rem -= count * s.u; }
    });
    return rem === 0 ? p : null;
  }

  // Default greedy
  let best = greedy(units, -1);
  // Also try without 大さじ1/2 (index 1)
  const alt = greedy(units, 1);
  if (alt && best && alt.length <= best.length) best = alt;

  if (!best || best.length === 0) return '少量';
  return best.map(p => p.label + ' ' + p.count + '杯').join('\u3000');
}

function calculate() {
  const ratio = state.target / state.recipe;
  let totalCC = 0;
  for (const [k, v] of Object.entries(state.measures)) {
    totalCC += v * CC[k];
  }
  const adjustedCC = totalCC * ratio;
  const density = DENSITY[document.getElementById('seasoning').value] || 1.0;
  const grams = adjustedCC * density;

  document.getElementById('result-measure').textContent = toSpoonText(adjustedCC);
  document.getElementById('result-cc').innerHTML = adjustedCC.toFixed(1) + ' <small>cc</small>';
  document.getElementById('result-g').innerHTML = '約 ' + Math.round(grams) + ' <small>g</small>';

  const note = ratio === 1
    ? 'レシピ通りの分量を表示しています'
    : `${state.recipe}人分 → ${state.target}人分（${ratio.toFixed(1)}倍）に換算`;
  document.getElementById('serving-note').textContent = note;
}

calculate();
</script>
</body>
</html>
